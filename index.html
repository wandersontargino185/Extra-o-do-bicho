<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator Bicho BR v2.2 - com Blacklist</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Inter,Arial,sans-serif; }
  body { background:#0f172a; color:#f8fafc; padding:20px; display:flex; justify-content:center; }
.container { width:100%; max-width:650px; background:rgba(255,255,255,0.08); backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.12); border-radius:24px; padding:24px; }
  h1 { font-size:24px; margin-bottom:8px; text-align:center; }
  p { color:#cbd5e1; font-size:14px; text-align:center; margin-bottom:20px; }
  label { font-size:13px; color:#cbd5e1; display:block; margin:12px 0 6px; }
  input[type="date"], select { width:100%; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.08); color:white; }
  select option { background:#1e293b; color:white; }
.row { display:flex; gap:12px; }
.row > div { flex:1; }
  button { width:100%; padding:14px; border:none; border-radius:14px; font-weight:700; font-size:15px;
    cursor:pointer; margin-top:12px; transition:all 0.2s; }
  button:hover { transform:translateY(-2px); opacity:0.95; }
  button:disabled { opacity:0.6; cursor:not-allowed; }
.btn-primary { background:linear-gradient(135deg,#8b5cf6,#7c3aed); color:white; }
.btn-success { background:linear-gradient(135deg,#22c55e,#16a34a); color:white; }
.btn-stop { background:linear-gradient(135deg,#ef4444,#dc2626); color:white; }
.log { background:rgba(0,0,0,0.3); border-radius:12px; padding:12px; margin-top:16px; font-size:13px;
    max-height:300px; overflow:auto; white-space:pre-wrap; font-family:monospace; }
.stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.stat-box { background:rgba(255,255,255,0.06); padding:12px; border-radius:12px; text-align:center; }
.stat-box b { font-size:20px; display:block; }
.hidden { display:none; }
  @media(max-width:600px){.row { flex-direction:column; }.stats { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container">
  <h1>🎲 Extrator Bicho BR v2.2</h1>
  <p>Com blacklist de números fantasmas</p>

  <label>Estado</label>
  <select id="estado">
    <option value="pe">Pernambuco - PE</option>
    <option value="rj">Rio de Janeiro - RJ</option>
    <option value="sp">São Paulo - SP</option>
    <option value="mg">Minas Gerais - MG</option>
    <option value="ba">Bahia - BA</option>
    <option value="ce">Ceará - CE</option>
  </select>

  <div class="row">
    <div>
      <label>Data Início</label>
      <input type="date" id="dataInicio">
    </div>
    <div>
      <label>Data Fim</label>
      <input type="date" id="dataFim">
    </div>
  </div>

  <button class="btn-primary" id="btnStart" onclick="iniciar()">🚀 Iniciar Extração</button>
  <button class="btn-stop hidden" id="btnStop" onclick="parar()">⏹️ Parar</button>
  <button class="btn-success hidden" id="btnDownload" onclick="baixarTXT()">📥 Baixar TXT</button>

  <div class="stats hidden" id="stats">
    <div class="stat-box">
      <span>Total</span>
      <b id="totalNum">0</b>
    </div>
    <div class="stat-box">
      <span>Dias OK</span>
      <b id="diasOk">0</b>
    </div>
  </div>

  <div class="log" id="log">Aguardando início...</div>
</div>

<script>
// ============================================================
// 🔥 BLACKLIST - números fantasmas que sempre aparecem no site
// ============================================================
const BLACKLIST = [
  '1000', '1024', '1100', '1200', '1500', '1800',
  '2200', '2500', '2800', '4000', '5000', '5390',
  '5500', '7000', '2025', '2026'
];

// Proxies para contornar CORS
const PROXIES = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest='
];

let rodando = false;
let resultados = [];
let setResultados = new Set();
let diasOk = 0;

document.getElementById('dataInicio').valueAsDate = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000);
document.getElementById('dataFim').valueAsDate = new Date();

function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
  document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
}

function updateStats() {
  document.getElementById('totalNum').textContent = resultados.length;
  document.getElementById('diasOk').textContent = diasOk;
  document.getElementById('stats').classList.remove('hidden');
}

function gerarDatas(inicio, fim) {
  const arr = [];
  let dt = new Date(inicio + 'T00:00:00');
  const dtFim = new Date(fim + 'T00:00:00');
  while (dt <= dtFim) {
    arr.push(dt.toISOString().slice(0,10));
    dt.setDate(dt.getDate() + 1);
  }
  return arr;
}

async function fetchComFallback(url) {
  for (let proxy of PROXIES) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      const res = await fetch(proxy + encodeURIComponent(url), {signal: controller.signal});
      clearTimeout(timeout);
      if (res.ok) return await res.text();
    } catch(e) {}
  }
  throw new Error('Todos os proxies falharam');
}

function extrairMilhar(html) {
  // Remove scripts e estilos para não capturar números de código
  const htmlLimpo = html.replace(/<script[\s\S]*?<\/script>/gi, ' ')
                        .replace(/<style[\s\S]*?<\/style>/gi, ' ')
                        .replace(/<[^>]+>/g, ' '); // remove tags, mantém texto

  // Regex para achar 4 dígitos isolados
  const regex = /(?:^|\D)(\d{4})(?:\D|$)/g;
  const matches = [];
  let match;
  while ((match = regex.exec(htmlLimpo)) !== null) {
    const milhar = match[1];
    // 🔥 PULA SE ESTIVER NA BLACKLIST
    if (BLACKLIST.includes(milhar)) continue;
    const n = parseInt(milhar);
    if (n >= 0 && n <= 9999) matches.push(milhar);
  }
  return [...new Set(matches)];
}

async function iniciar() {
  const estado = document.getElementById('estado').value;
  const inicio = document.getElementById('dataInicio').value;
  const fim = document.getElementById('dataFim').value;

  if (!inicio || !fim) return alert('Preenche as duas datas');
  if (new Date(inicio) > new Date(fim)) return alert('Data início maior que fim');

  const datas = gerarDatas(inicio, fim);
  if (datas.length > 90 && !confirm(`Vai puxar ${datas.length} dias. Continuar?`)) return;

  rodando = true;
  resultados = [];
  setResultados.clear();
  diasOk = 0;
  document.getElementById('log').textContent = '';
  document.getElementById('btnStart').classList.add('hidden');
  document.getElementById('btnStop').classList.remove('hidden');
  document.getElementById('btnDownload').classList.add('hidden');

  log(`Iniciando ${datas.length} dias - ${estado.toUpperCase()}`);
  log('================================\n');

  for (let i = 0; i < datas.length && rodando; i++) {
    const data = datas[i];
    log(`[${i+1}/${datas.length}] ${data}... `);

    try {
      const url = `https://www.resultadofacil.com.br/resultado-do-jogo-do-bicho/${estado}/do-dia/${data}`;
      const html = await fetchComFallback(url);

      const milhares = extrairMilhar(html);
      const novos = milhares.filter(m => !setResultados.has(m));

      novos.forEach(m => {
        resultados.push(m);
        setResultados.add(m);
      });

      if (novos.length > 0) diasOk++;
      log(`+${novos.length} resultados`);
      updateStats();

    } catch (err) {
      log(`ERRO: ${err.message}`);
    }

    await new Promise(r => setTimeout(r, 2000));
  }

  rodando = false;
  document.getElementById('btnStop').classList.add('hidden');
  document.getElementById('btnStart').classList.remove('hidden');

  if (resultados.length > 0) {
    document.getElementById('btnDownload').classList.remove('hidden');
    log(`\n✅ Finalizado!`);
    log(`Total: ${resultados.length} milhares únicos`);
    log(`Dias com resultado: ${diasOk}/${datas.length}`);
  } else {
    log('\n❌ Nenhum resultado encontrado');
  }
}

function parar() {
  rodando = false;
  log('\n⏹️ Parado pelo usuário');
}

function baixarTXT() {
  const conteudo = resultados.join('\n');
  const blob = new Blob([conteudo], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');

  const estado = document.getElementById('estado').value;
  const inicio = document.getElementById('dataInicio').value;
  const fim = document.getElementById('dataFim').value;
  a.download = `bicho_${estado}_${inicio}_ate_${fim}_${resultados.length}.txt`;

  a.href = url;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
